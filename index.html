<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="head">
            <h1 id="title"><span>Generate a</span>
                <span id="two">random password</span></h1>
        </div>
        <p id="word">Never use an insecure password again</p>
        <button class="click" onclick="randomEl()">Generate Password</button>
        <div class="line">
            <div class="box" id="password1"></div>
            <div class="box" id="password2"></div>
        </div>
        <div>
            <label for="input" id="input-label">Password Length:</label>
            <input id="input" type="number" min="5" max="20" value="15">
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
